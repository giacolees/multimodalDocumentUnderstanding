# docker-compose.yml
name: docUnderstanding-platform

services:
  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - "6380:6379"
      - "18001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  llama-worker-0:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    environment:
      CUDA_VISIBLE_DEVICES: "0"
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models:ro
    command: >
      --model /models/${LLAMA_MODEL_FILE:-model.gguf}
      --host 0.0.0.0 --port 8080
      --n-gpu-layers ${GPU_LAYERS:-99}
      --ctx-size 4096
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  llama-worker-1:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    environment:
      CUDA_VISIBLE_DEVICES: "1"
    ports:
      - "8082:8080"
    volumes:
      - ./models:/models:ro
    command: >
      --model /models/${LLAMA_MODEL_FILE:-model.gguf}
      --host 0.0.0.0 --port 8080
      --n-gpu-layers ${GPU_LAYERS:-99}
      --ctx-size 4096
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  vllm-worker-0:
    build:
      context: .
      dockerfile: services/vllm-worker/Dockerfile
    environment:
      HF_HOME: /models/hf_cache
      HF_TOKEN: ${HF_TOKEN:-}
      FLASHINFER_DISABLE_VERSION_CHECK: ${FLASHINFER_DISABLE_VERSION_CHECK:-0}
    ports:
      - "8083:8000"
    volumes:
      - ./models:/models
      - ./services/vllm-worker/templates:/templates:ro
    command: >
      --model ${VLLM_MODEL:-google/gemma-4-E4B-it}
      --host 0.0.0.0 --port 8000
      --dtype auto
      --max-model-len ${VLLM_MAX_LEN:-4096}
      --tensor-parallel-size ${VLLM_TP_SIZE:-1}
      ${VLLM_EXTRA_ARGS:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  vllm-worker-1:
    build:
      context: .
      dockerfile: services/vllm-worker/Dockerfile
    environment:
      HF_HOME: /models/hf_cache
      HF_TOKEN: ${HF_TOKEN:-}
      FLASHINFER_DISABLE_VERSION_CHECK: ${FLASHINFER_DISABLE_VERSION_CHECK:-0}
    ports:
      - "8084:8000"
    volumes:
      - ./models:/models
      - ./services/vllm-worker/templates:/templates:ro
    command: >
      --model ${VLLM_MODEL:-google/gemma-4-E4B-it}
      --host 0.0.0.0 --port 8000
      --dtype auto
      --max-model-len ${VLLM_MAX_LEN:-4096}
      --tensor-parallel-size ${VLLM_TP_SIZE:-1}
      ${VLLM_EXTRA_ARGS:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

volumes:
  redis-data:
