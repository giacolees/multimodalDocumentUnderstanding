# docker-compose.yml
name: docvqa-platform

services:
  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "18001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  llama-worker-0:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    environment:
      CUDA_VISIBLE_DEVICES: "0"
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models:ro
    command: >
      --model /models/${LLAMA0_MODEL_FILE:-model.gguf}
      --host 0.0.0.0 --port 8080
      --n-gpu-layers ${GPU_LAYERS:-99}
      --ctx-size 4096
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  llama-worker-1:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    environment:
      CUDA_VISIBLE_DEVICES: "1"
    ports:
      - "8082:8080"
    volumes:
      - ./models:/models:ro
    command: >
      --model /models/${LLAMA1_MODEL_FILE:-model.gguf}
      --host 0.0.0.0 --port 8080
      --n-gpu-layers ${GPU_LAYERS:-99}
      --ctx-size 4096
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  vllm-worker-0:
    image: vllm/vllm-openai:latest
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      HF_HOME: /models/hf_cache
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8083:8000"
    volumes:
      - ./models:/models
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2-VL-7B-Instruct}
      --host 0.0.0.0 --port 8000
      --dtype auto
      --max-model-len ${VLLM_MAX_LEN:-4096}
      --limit-mm-per-prompt image=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  vllm-worker-1:
    image: vllm/vllm-openai:latest
    environment:
      CUDA_VISIBLE_DEVICES: "1"
      HF_HOME: /models/hf_cache
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8084:8000"
    volumes:
      - ./models:/models
    command: >
      --model ${VLLM_MODEL_1:-Qwen/Qwen2-VL-7B-Instruct}
      --host 0.0.0.0 --port 8000
      --dtype auto
      --max-model-len ${VLLM_MAX_LEN:-4096}
      --limit-mm-per-prompt image=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  evaluation-svc:
    build:
      context: .
      dockerfile: services/evaluation-svc/Dockerfile
    ports:
      - "8003:8003"
    environment:
      JUDGE_MODEL: ${JUDGE_MODEL:-gemini-2.0-flash}
      JUDGE_BASE_URL: ${JUDGE_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      redis-stack:
        condition: service_healthy

  model-gateway:
    build:
      context: .
      dockerfile: services/model-gateway/Dockerfile
    ports:
      - "8001:8001"
    environment:
      LLAMA_URLS: http://llama-worker-0:8080,http://llama-worker-1:8080
      VLLM_URLS: http://vllm-worker-0:8000,http://vllm-worker-1:8000
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ENABLED_MODELS: ${ENABLED_MODELS:-llama,vllm}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      llama-worker-0:
        condition: service_healthy
      llama-worker-1:
        condition: service_healthy
      vllm-worker-0:
        condition: service_healthy
      vllm-worker-1:
        condition: service_healthy

  document-svc:
    build:
      context: .
      dockerfile: services/document-svc/Dockerfile
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: redis://redis-stack:6379
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      redis-stack:
        condition: service_healthy

  job-runner:
    build:
      context: .
      dockerfile: services/job-runner/Dockerfile
    ports:
      - "8004:8004"
    environment:
      REDIS_URL: redis://redis-stack:6379
      MODEL_GATEWAY_URL: http://model-gateway:8001
      DOCUMENT_SVC_URL: http://document-svc:8002
      EVALUATION_SVC_URL: http://evaluation-svc:8003
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    depends_on:
      redis-stack:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      JOB_RUNNER_URL: http://job-runner:8004
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - job-runner

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api-gateway
      - model-gateway
      - document-svc
      - evaluation-svc
      - job-runner

volumes:
  redis-data:
