# Part 3 – mitigation settings

corrupted_dataset: data/final/merged_final_explored.json
baseline_results: results/benchmark/test_metrics.json
output_dir: results/mitigation_Qwen3-VL-4B
mlflow_experiment: mitigation_Qwen3.

# max_samples: 1000    # number of samples from the dataset to run mitigation on (null = all)
subset_ids: results/test_ids.json # path to a JSON file with a list of sample_id strings to run on (overrides max_samples)
  # Example: results/mitigation_mp_docvqa_rag_Qwen3-VL/mitigation_subset_ids.json

model:
  backend: vllm          # mistral | google | openrouter | llama_cpp | vllm
  base_url:               # single URL or a list — list round-robins requests across replicas
    - http://localhost:8083/v1   # vllm-worker-0 (GPU 0)
    - http://localhost:8084/v1   # vllm-worker-1 (GPU 1)
  model_id: Qwen/Qwen3-VL-4B-Instruct
  concurrency: 8        # in-flight requests, round-robined across both workers
  max_image_pixels: 1048576   # downscale to ~1MP before sending; vision tokens dominate
                               # input length far more than chunk_max_chars/transcribe_max_tokens below

strategies:
  - few_shot
  - rag
  # - finetuning

few_shot:
  k: 2          # number of examples to inject

rag:
  retrieval_mode:           # list → runs one experiment per mode; single string → runs just that mode
    - dense
    - bm25
    - hybrid
  embed_model: sentence-transformers/all-MiniLM-L6-v2
  top_k: 3
  chunk_max_chars: 400
  transcribe_max_tokens: 1024
  max_image_pixels: 1048576   # downscale to ~1MP before sending; vision tokens dominate input length far more than chunk_max_chars/transcribe_max_tokens below
  cache_dir: data/ocr_cache

finetuning:
  model_name: unsloth/Qwen2.5-VL-3B-Instruct
  output_dir: results/finetuned_judge
  load_in_4bit: true
  lora_r: 16
  lora_alpha: 16
  train_split: 0.8
  max_steps: 60
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  max_seq_length: 2048
  seed: 42
