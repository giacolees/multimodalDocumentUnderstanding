# Part 3 – mitigation settings

corrupted_dataset: data/final/mp_docvqa_final.json
baseline_results: results/benchmark_mp_docvqa/vllm:Qwen_Qwen3-VL-2B-Instruct-GGUF_benchmark_result.json
output_dir: results/mitigation_mp_docvqa_Qwen3-VL
mlflow_experiment: mitigation_fs_mp_docvqa_qwen3-VL

max_samples: 1000    # number of samples from the dataset to run mitigation on (null = all)
subset_ids: results/mitigation_mp_docvqa/mitigation_subset_ids.json         # path to a JSON file with a list of sample_id strings to run on (overrides max_samples)
  # Example: results/mitigation_mp_docvqa_rag_Qwen3-VL/mitigation_subset_ids.json

model:
  backend: vllm          # mistral | google | openrouter | llama_cpp | vllm
  base_url: http://localhost:8084/v1   # vllm-worker-0
  model_id: Qwen/Qwen3-VL-2B-Instruct-GGUF

strategies:
  - few_shot
  # - chain_of_thought
  # - knowledge_injection
  # - rag
  # Uncomment to include fine-tuning (requires GPU + unsloth):
  # - finetuning

few_shot:
  k: 2          # number of examples to inject

knowledge_injection:
  extract_metadata_automatically: false   # set true to run OCR-based metadata extraction

rag:
  retrieval_mode:           # list → runs one experiment per mode; single string → runs just that mode
    - dense
    - bm25
    - hybrid
  embed_model: sentence-transformers/all-MiniLM-L6-v2
  top_k: 4
  chunk_max_chars: 400
  transcribe_max_tokens: 1024
  cache_dir: data/ocr_cache

finetuning:
  model_name: unsloth/Qwen2.5-VL-3B-Instruct
  output_dir: results/finetuned_judge
  load_in_4bit: true
  lora_r: 16
  lora_alpha: 16
  train_split: 0.8
  max_steps: 60
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  max_seq_length: 2048
  seed: 42
