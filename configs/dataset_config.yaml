# Part 1 – dataset corruption settings

dataset: docvqa          # docvqa | dude | mp_docvqa
split: val

loader:
  window_size: 2         # for mp_docvqa only; number of pages per window

corruption:
  seed: 42
  max_samples: 500       # -1 = use all
  # target distribution across corruption types (must sum to 1.0)
  distribution:
    nlp_entity: 0.40
    element: 0.35
    layout: 0.25

quality_check:
  use_judge: true
  judge_model: Smoffyy/Qwen3.5-4B-Instruct-Pure-GGUF:Q4_K_M
  judge_base_url: http://localhost:8080/v1   # set for llama-server; omit for cloud models
  confidence_threshold: 0.60   # unanswerable verdicts below this are dropped
  max_retries: 2               # output-validation retries before raising UnexpectedModelBehavior
  max_tokens: 2048             # increase for thinking/reasoning models (e.g. Qwen3) that burn tokens before output
