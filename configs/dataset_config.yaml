# dataset corruption settings

dataset: docvqa                 # docvqa | dude | mp_docvqa
data_dir: data/raw/docvqa       # input: raw dataset directory
output_dir: data/corrupted      # output: where corrupted JSON is written
split: val

loader:
  window_size: 2         # for mp_docvqa only; number of pages per window

corruption:
  seed: 42
  max_samples: -1       # -1 = use all
  # target distribution across corruption types (must sum to 1.0)
  distribution:
    nlp_entity: 0.40
    element: 0.35
    layout: 0.25

quality_check:
  use_judge: true
  judge_model: google/gemma-4-E2B-it
  judge_base_url: http://localhost:8083/v1    # local vllm-worker-1
  confidence_threshold: 0.60   # unanswerable verdicts below this are dropped
  max_retries: 2               # output-validation retries before raising UnexpectedModelBehavior
  max_tokens: 2048
